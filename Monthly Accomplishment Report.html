<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Monthly Accomplishment Report</title>
    <style>
        h4 {
            display: inline-block;
            margin: 0 0 0 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-family: sans-serif;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f4f4f4;
        }
        /* Highlight cell on hover to indicate it's editable */
        td:hover {
            background-color: #f9f9f9;
            cursor: text;
        }
        /* Style when cell is focused */
        td:focus {
            outline: 2px solid #4285f4;
            background-color: #fff;
        }
        button {
            margin-top: 10px;
            padding: 8px 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h3>PERSONNEL'S MONTHLY ACCOMPLISHMENT REPORT</h3>

    <h4>Name:</h4>
    <input type="text" placeholder="Full Name"></input><br><br>
    <h4>OFFICE/JAIL UNIT:</h4>
    <input type="text" placeholder="Office/Jail Unit"></input><br><br>
    <h4>DIVISION/SECTION</h4>
    <input type="text" placeholder="Division/Section"></input><br><br>
    <h4>PERIOD COVERED:</h4>
    <input type="text" placeholder="June 1-31, 2026"></input><br><br><br>
    <table id="pmar">
        <thead>
            <tr>
                <th rowspan="2">DATE</th>
                <th colspan="1">MAJOR FINAL OUTPUT</th>
                <th colspan="3">RATING</th>
                <th rowspan="2">REMARKS</th>
                    <tr>
                        <th>Note: List down all your accomplished task (Narrated based on your Success Indicator (S.I) of your PCR form)</th>
                        <th>Q</th>
                        <th>E</th>
                        <th>T</th>
                    </tr>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td contenteditable="true" id="marDate"></td>
                <td contenteditable="true" id="marMFO"></td>
                <td contenteditable="true" id="marQ"></td>
                <td contenteditable="true" id="marE"></td>
                <td contenteditable="true" id="marT"></td>
                <td contenteditable="true" id="marRemarks"></td>
            </tr>
        </tbody>
    </table>

    <button onclick="addRow()">Add Row</button>

    <script>
        function addRow() {
            const table = document.getElementById("pmar").getElementsByTagName('tbody')[0];
            const newRow = table.insertRow();
            for (let i = 0; i < 6; i++) {
                const newCell = newRow.insertCell(i);
                newCell.contentEditable = "true";
            }
        }
    </script>
</body>
</html>
